<mat-sidenav-container class="shop-container">
    <mat-sidenav #sidenav mode="side" [opened]="true" class="shop-sidenav" [class.collapsed]="!isSidenavOpen">
        <div class="sidenav-header">
            <div class="logo-circle">
                <mat-icon>shopping_bag</mat-icon>
            </div>
            <span class="sidenav-text">Shop Panel</span>
        </div>

        <mat-nav-list class="nav-list-premium">
            <a mat-list-item routerLink="/shop/dashboard" routerLinkActive="active-link" title="Tableau de bord">
                <mat-icon matListItemIcon>dashboard</mat-icon>
                <span matListItemTitle class="sidenav-text">Tableau de bord</span>
            </a>
            <a mat-list-item routerLink="/shop/profile" routerLinkActive="active-link" title="Ma Boutique">
                <mat-icon matListItemIcon>storefront</mat-icon>
                <span matListItemTitle class="sidenav-text">Ma Boutique</span>
            </a>
            <a mat-list-item routerLink="/shop/products" routerLinkActive="active-link" title="Produits">
                <mat-icon matListItemIcon>inventory_2</mat-icon>
                <span matListItemTitle class="sidenav-text">Produits</span>
            </a>
            <a mat-list-item routerLink="/shop/offers" routerLinkActive="active-link" title="Offres">
                <mat-icon matListItemIcon>local_offer</mat-icon>
                <span matListItemTitle class="sidenav-text">Offres</span>
            </a>
            <a mat-list-item routerLink="/shop/reviews" routerLinkActive="active-link" title="Avis Clients">
                <mat-icon matListItemIcon>rate_review</mat-icon>
                <span matListItemTitle class="sidenav-text">Avis Clients</span>
            </a>
        </mat-nav-list>

        <div class="sidenav-footer">
            <button mat-flat-button class="logout-btn-premium" (click)="logout()" title="Déconnexion">
                <mat-icon>logout</mat-icon>
                <span class="sidenav-text" style="margin-left: 12px;">Déconnexion</span>
            </button>
        </div>
    </mat-sidenav>

    <mat-sidenav-content class="shop-content" [class.content-expanded]="!isSidenavOpen">
        <mat-toolbar class="shop-toolbar">
            <button mat-icon-button (click)="isSidenavOpen = !isSidenavOpen" class="menu-toggle">
                <mat-icon>menu</mat-icon>
            </button>

            <span class="toolbar-spacer"></span>

            <div class="shop-info-pill" *ngIf="shop">
                <img [src]="shop.picture || 'https://ui-avatars.com/api/?name=' + shop.name" alt="Logo"
                    class="shop-logo">
                <div class="shop-text sidenav-text">
                    <span class="name">{{ shop.name }}</span>
                    <span class="status" [ngClass]="statusInfo?.class">{{ statusInfo?.label }}</span>
                </div>
            </div>
        </mat-toolbar>

        <main class="page-content">
            <router-outlet></router-outlet>
        </main>

        <footer class="developer-credits">
            <span>&copy; 2026 Mall Platform. Développé par:</span>
            <span class="dev-names">RASOLOMALALA Finoana & HARISON Franck Mauriat</span>
        </footer>
    </mat-sidenav-content>
</mat-sidenav-container>
